<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cashflow DCF Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f9;
      --card: #ffffff;
      --text: #566a7f;
      --heading: #384551;
      --primary: #696cff;
      --primary-soft: #e7e7ff;
      --border: #d9dee3;
      --shadow: 0 0.125rem 0.375rem rgba(67, 89, 113, 0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--card);
      border-right: 1px solid rgba(67, 89, 113, 0.08);
      height: 100vh;
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
    }

    .brand {
      align-items: center;
      color: var(--heading);
      display: flex;
      font-weight: 700;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding: 0 0.75rem;
    }

    .brand-mark {
      align-items: center;
      background: var(--primary);
      border-radius: 0.75rem;
      color: white;
      display: grid;
      height: 2.5rem;
      place-items: center;
      width: 2.5rem;
    }

    .menu-label {
      color: #a1acb8;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin: 1.5rem 0 0.5rem;
      padding: 0 0.75rem;
      text-transform: uppercase;
    }

    .menu-item {
      align-items: center;
      border-radius: 0.625rem;
      color: var(--text);
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
      padding: 0.75rem;
      text-decoration: none;
    }

    .menu-item.active,
    .menu-item:hover {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .content { padding: 1.5rem; }

    .topbar,
    .card-lite {
      background: var(--card);
      border: 0;
      border-radius: 1rem;
      box-shadow: var(--shadow);
    }

    .topbar {
      align-items: center;
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--heading);
      font-weight: 700;
    }

    .stat-icon {
      align-items: center;
      background: var(--primary-soft);
      border-radius: 0.75rem;
      color: var(--primary);
      display: grid;
      height: 2.75rem;
      place-items: center;
      width: 2.75rem;
    }

    .form-control { border-color: var(--border); padding: 0.75rem 0.875rem; }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .cashflow-list span { min-width: 4.25rem; }

    @media (max-width: 992px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; }
      .topbar { align-items: flex-start; flex-direction: column; gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><i class="bi bi-cash-stack"></i></div>
        <div>
          <div>Cashflow DCF</div>
          <small class="text-muted">DCF Page</small>
        </div>
      </div>

      <div class="menu-label">Pages</div>
      <a class="menu-item" href="valuation_agent_dashboard.html"><i class="bi bi-bar-chart-line"></i> Fair Multiple</a>
      <a class="menu-item active" href="cashflow_dashboard.html"><i class="bi bi-cash-stack"></i> Cashflow DCF</a>
    </aside>

    <main class="content">
      <header class="topbar">
        <form id="cashflowSearchForm" class="d-flex align-items-center gap-3">
          <button class="search-submit btn btn-link p-0 text-muted" type="submit" aria-label="Search company"><i class="bi bi-search"></i></button>
          <input id="companyQuery" type="text" class="form-control border-0 shadow-none px-0" value="601318.XSHG" placeholder="请输入企业名、代码或企业号" aria-label="Company name, trading code, or order_book_id" style="background:transparent;outline:none;min-width:220px;">
        </form>
        <div>
          <span id="headerCompanyName" class="fw-semibold text-muted small">中国平安</span>
        </div>
      </header>

      <section class="row g-4 mb-4">
        <div class="col-12 col-xl-4">
          <div class="card card-lite h-100">
            <div class="card-body p-4">
              <div class="stat-icon mb-3"><i class="bi bi-sliders"></i></div>
              <h2 class="h5 mb-3">DCF assumptions</h2>
              <form id="assumptionForm">
                <label class="form-label" for="discountRate">Discount rate</label>
                <input id="discountRate" class="form-control mb-3" type="number" step="0.01" value="0.12">
                <label class="form-label" for="growthRate">Terminal growth rate</label>
                <input id="growthRate" class="form-control mb-4" type="number" step="0.01" value="0.03">
                <button class="btn btn-primary w-100" type="submit">Recalculate DCF</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-8">
          <div class="card card-lite h-100">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h2 id="cashflowTitle" class="h5 mb-1">Cashflow model results</h2>
                  <p id="cashflowSubtitle" class="text-muted mb-0">Loading cashflow model results...</p>
                </div>
              </div>
              <div id="cashflowNotice" class="alert alert-primary py-2 mb-4 d-none" role="status"></div>
              <div id="modelCards" class="row g-3"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const assumptionForm = document.getElementById("assumptionForm");
    const searchForm = document.getElementById("cashflowSearchForm");
    const companyQuery = document.getElementById("companyQuery");
    const discountRate = document.getElementById("discountRate");
    const growthRate = document.getElementById("growthRate");
    const cashflowTitle = document.getElementById("cashflowTitle");
    const cashflowSubtitle = document.getElementById("cashflowSubtitle");
    const cashflowNotice = document.getElementById("cashflowNotice");
    const modelCards = document.getElementById("modelCards");
    const headerCompanyName = document.getElementById("headerCompanyName");
    const localApiOrigin = "http://127.0.0.1:8765";

    function apiOrigin() {
      return window.location.protocol === "file:" ? localApiOrigin : window.location.origin;
    }

    function formatNumber(value) {
      return Number(value).toLocaleString(undefined, { maximumFractionDigits: 4 });
    }

    function renderModel(model) {
      const cashFlows = model.cash_flows.map((value, index) => `<li class="d-flex justify-content-between"><span>Year ${index + 1}</span><strong>${formatNumber(value)}</strong></li>`).join("");
      const isRandomForest = model.model === "Random Forest";
      const cardClass = isRandomForest ? "border border-primary rounded-4 p-3 h-100" : "border rounded-4 p-3 h-100";
      const badge = isRandomForest ? '<span class="badge text-bg-primary mb-2">Primary model</span>' : "";
      return `
        <div class="col-12 col-lg-6">
          <div class="${cardClass}">
            ${badge}
            <p class="text-muted mb-1">${model.model}</p>
            <h3 class="h4 mb-1">${formatNumber(model.dcf_value)}</h3>
            <p class="small text-muted mb-2">Terminal value ${formatNumber(model.terminal_value)}</p>
            <p class="small text-muted mb-2">R2 ${formatNumber(model.r2)} | MAE ${formatNumber(model.mae)}</p>
            <ul class="cashflow-list list-unstyled small mb-0">${cashFlows}</ul>
          </div>
        </div>`;
    }

    async function loadCashflow() {
      const company = companyQuery.value.trim() || "601318.XSHG";
      const params = new URLSearchParams({
        company,
        discount_rate: discountRate.value,
        growth_rate: growthRate.value,
      });
      cashflowNotice.className = "alert alert-primary py-2 mb-4";
      cashflowNotice.textContent = "Loading cashflow DCF results...";
      try {
        const response = await fetch(`${apiOrigin()}/api/cashflow?${params.toString()}`);
        const contentType = response.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          throw new Error("Cashflow API is not available on the running server.");
        }
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Cashflow DCF lookup failed.");
        }
        cashflowTitle.textContent = `${data.company_name} cashflow DCF`;
        cashflowSubtitle.textContent = `${data.company_id} | discount ${(data.discount_rate * 100).toFixed(1)}% | terminal growth ${(data.growth_rate * 100).toFixed(1)}%`;
        headerCompanyName.textContent = data.company_name;
        if (data.note) {
          cashflowNotice.className = "alert alert-primary py-2 mb-4";
          cashflowNotice.textContent = data.note;
        } else {
          cashflowNotice.className = "alert alert-primary py-2 mb-4 d-none";
          cashflowNotice.textContent = "";
        }
        modelCards.innerHTML = data.models.map(renderModel).join("");
      } catch (error) {
        cashflowNotice.className = "alert alert-danger py-2 mb-4";
        cashflowNotice.textContent = `${error.message} Restart the server from the project folder: python3 valuation_api_server.py`;
      }
    }

    assumptionForm.addEventListener("submit", (event) => {
      event.preventDefault();
      loadCashflow();
    });

    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      loadCashflow();
    });

    loadCashflow();
  </script>
</body>
</html>
